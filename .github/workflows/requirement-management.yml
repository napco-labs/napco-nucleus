name: Requirement Management

# Ingests raw client text from email (IMAP) + Google Drive meeting
# recordings + PDFs + Teams (forwarded via Power Automate into the
# same allowlisted email inbox). Claude splits each source into
# ~3-hour tasks and publishes to GitLab with idempotent dedup.
#
# Fires twice daily, 12 hours apart, every day + workflow_dispatch.

on:
  # Schedule disabled 2026-05-05 — v1 of requirement management runs
  # locally inside Teams-Requirement-Watcher. Re-enable once that v1
  # is proven and we migrate the pipeline back to the runner.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Plan only — do not publish to GitLab'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

concurrency:
  group: requirement-management
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 25

    env:
      MVP_PROJECTS_ROOT: 'E:\Projects'
      # Claude CLI path on the runner. Must be the native .exe (not the
      # npm .cmd shim) — Windows cmd.exe truncates command lines past
      # ~8191 chars, which trips on NN's large system prompt and surfaces
      # as `The command line is too long` from inside the SDK init.
      # The native .exe at %USERPROFILE%\.local\bin\claude.exe is
      # installed via `irm https://claude.ai/install.ps1 | iex` and
      # spawns directly with no cmd.exe in the chain.
      CLAUDE_CLI_PATH: 'C:\Users\samin\.local\bin\claude.exe'
      # IMAP for requirement-email ingestion.
      REQ_IMAP_HOST: ${{ secrets.REQ_IMAP_HOST }}
      REQ_IMAP_USER: ${{ secrets.REQ_IMAP_USER }}
      REQ_IMAP_PASSWORD: ${{ secrets.REQ_IMAP_PASSWORD }}
      REQ_SENDER_ALLOWLIST: ${{ secrets.REQ_SENDER_ALLOWLIST }}
      # OpenProject backlog destination (replaces GitLab as of 2026-04-28).
      OPENPROJECT_URL: ${{ secrets.OPENPROJECT_URL }}
      OPENPROJECT_PROJECT_ID: ${{ secrets.OPENPROJECT_PROJECT_ID }}
      OPENPROJECT_API_KEY: ${{ secrets.OPENPROJECT_API_KEY }}
      # Google Drive + Groq Whisper.
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_AUDIO_FOLDER_ID: ${{ secrets.GDRIVE_AUDIO_FOLDER_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Teams digest target (optional).
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Run Requirement Management
        shell: pwsh
        run: py -3 agent.py --task requirement-management ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db data/requirements/ 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "requirement-management: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
