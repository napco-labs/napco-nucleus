name: Requirement Management

# Ingests raw client text from email (IMAP) + Google Drive meeting
# recordings + PDFs + Teams (forwarded via Power Automate into the
# same allowlisted email inbox). Claude splits each source into
# ~3-hour tasks and publishes to GitLab with idempotent dedup.
#
# Fires every 2 hours during business hours + workflow_dispatch.

on:
  schedule:
    # 3:00 / 5:00 / 7:00 / 9:00 / 11:00 UTC = 9:00 / 11:00 / 13:00 /
    # 15:00 / 17:00 BDT — a comfortable 5-slot business-hours poll.
    - cron: '0 3,5,7,9,11 * * 0-4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Plan only — do not publish to GitLab'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

concurrency:
  group: requirement-management
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 25

    env:
      # IMAP for requirement-email ingestion.
      REQ_IMAP_HOST: ${{ secrets.REQ_IMAP_HOST }}
      REQ_IMAP_USER: ${{ secrets.REQ_IMAP_USER }}
      REQ_IMAP_PASSWORD: ${{ secrets.REQ_IMAP_PASSWORD }}
      REQ_SENDER_ALLOWLIST: ${{ secrets.REQ_SENDER_ALLOWLIST }}
      # GitLab backlog destination.
      GITLAB_HOST: ${{ secrets.GITLAB_HOST }}
      GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      GITLAB_DEFAULT_LABELS: ${{ secrets.GITLAB_DEFAULT_LABELS }}
      # Google Drive + Groq Whisper.
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_AUDIO_FOLDER_ID: ${{ secrets.GDRIVE_AUDIO_FOLDER_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Teams digest target (optional).
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Run Requirement Management
        shell: pwsh
        run: py -3 agent.py --task requirement-management ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db data/requirements/ 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "requirement-management: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
