name: Requirement Management

# The one and only NAPCO Nucleus pipeline workflow. Click "Run
# workflow" in the Actions tab to do the whole job end-to-end on
# MVPACCESS:
#
#   1. Pull email from the configured inbox (last N minutes)
#   2. Pull Google Drive files (last N minutes)
#   3. Walk the central share for chat docs + attachments + call
#      recordings every developer has pushed today
#   4. Transcribe any new call recordings (chunked parallel Whisper)
#   5. Build the unified pull-session .docx
#   6. Identify distinct client requirements (LLM)
#   7. Draft the verification email into [Gmail]/Drafts
#
# Audio + chat capture happens on each developer's machine (voice
# daemon + chat-push cron). By the time you click "Run workflow"
# here, both are already on central — this workflow only does the
# central-side work.
#
# For the local "force everything from my PC right now" alternative,
# double-click scripts\do-it-now.bat instead.

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client filter (substring against metadata.client_name; "all" for unfiltered)'
        required: true
        default: 'all'
        type: string
      last_minutes:
        description: 'Time window in minutes (email + Drive + chat lookback)'
        required: true
        default: '2880'
        type: string
      day:
        description: 'Central scan day (YYYY-MM-DD). Empty = today.'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Skip the local push + identify step (just collect + transcribe)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

concurrency:
  group: requirement-management
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Run pipeline
        run: |
          $args = @('--client', '${{ inputs.client }}', '--last-minutes', '${{ inputs.last_minutes }}')
          if ('${{ inputs.day }}' -ne '') { $args += @('--day', '${{ inputs.day }}') }
          if ('${{ inputs.dry_run }}' -eq 'true') { $args += '--no-identify' }
          Write-Host "Running: py -3 collect_central.py $args"
          py -3 collect_central.py @args

      - name: Upload session doc on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: session-doc-on-failure
          path: 'C:\napco-nucleus\data\requirements\sessions\current.docx'
          if-no-files-found: ignore
          retention-days: 7
