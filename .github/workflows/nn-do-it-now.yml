name: NN - Do It Now

# Runs the full requirement-management pipeline end-to-end via the
# do_it_now.py wrapper. Force-pushes the local Teams chat (no-op on
# the runner since it has no Teams session — that's why we don't
# rely on this for chat capture), then collect_central:
#   - pulls email (last N minutes)
#   - pulls Google Drive (last N minutes)
#   - walks central calls + chats for every dev today
#   - transcribes calls
#   - identifies requirements
#   - drafts the verification email into [Gmail]/Drafts

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client filter (substring against metadata.client_name; "all" for unfiltered)'
        required: true
        default: 'all'
        type: string
      last_minutes:
        description: 'Time window in minutes (email + Drive + chat lookback)'
        required: true
        default: '2880'
        type: string
      day:
        description: 'Central scan day (YYYY-MM-DD). Empty = today.'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Skip the local push + identify step (just collect + transcribe)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

concurrency:
  group: nn-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Run pipeline
        run: |
          $args = @('--client', '${{ inputs.client }}', '--last-minutes', '${{ inputs.last_minutes }}')
          if ('${{ inputs.day }}' -ne '') { $args += @('--day', '${{ inputs.day }}') }
          if ('${{ inputs.dry_run }}' -eq 'true') { $args += '--no-identify' }
          Write-Host "Running: py -3 collect_central.py $args"
          py -3 collect_central.py @args

      - name: Upload session doc on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: session-doc-on-failure
          path: 'C:\napco-nucleus\data\requirements\sessions\current.docx'
          if-no-files-found: ignore
          retention-days: 7
