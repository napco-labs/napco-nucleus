name: MVP Access E2E Test

# Nightly Playwright full-suite run. Claude analyzes failures (regressions
# vs flakies vs known-bugs), composes the PDF with failure screenshots,
# ships to Dev + QA.

on:
  schedule:
    # 22:00 UTC = 04:00 BDT.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite: full / easy / release'
        required: false
        default: 'full'
        type: choice
        options: ['full', 'easy', 'release']
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

concurrency:
  group: e2e-test
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 45

    env:
      MVP_PROJECTS_ROOT: 'E:\Projects'
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      USER_ID: ${{ secrets.USER_ID }}
      COMPANY_ID: ${{ secrets.COMPANY_ID }}
      SUITE: ${{ github.event.inputs.suite || 'full' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Run MVP Access E2E Test
        shell: pwsh
        run: py -3 agent.py --task e2e-test ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "e2e-test: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
