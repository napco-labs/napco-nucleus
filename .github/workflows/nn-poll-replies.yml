name: NN - Poll Client Replies

# Scans IMAP inbox for replies to verification emails, asks Claude
# to classify per-requirement (confirmed / needs_change / rejected /
# unclear), updates requirements_seen.confirmation_status.
#
# Manual + every 4 hours on cron.

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Look-back window (days)'
        required: false
        default: '7'
        type: string
      dry_run:
        description: 'Classify but do not write to memory'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours

permissions:
  contents: read

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Poll replies
        run: |
          $args = @('--days', '${{ inputs.days || '7' }}')
          if ('${{ inputs.dry_run }}' -eq 'true') { $args += '--dry-run' }
          py -3 -m tools.poll_replies @args
