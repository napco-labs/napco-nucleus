name: Daily Report

# Claude-driven replacement for the old morning_brief.py Python script.
# Reads the last 24h of activity_logs + test_run_history + fresh
# test-report artifacts, composes an executive summary in natural
# language, ships PDF + email + Teams digest.

on:
  schedule:
    # 03:00 UTC = 09:00 BDT.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 20

    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      # Renders the From header as "NAPCO Nucleus <khasan@ael-bd.com>".
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
      REPORT_TO: ${{ secrets.REPORT_TO }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      # GitLab read-only for backlog summary in the report.
      GITLAB_HOST: ${{ secrets.GITLAB_HOST }}
      GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Build + ship Daily Report
        shell: pwsh
        run: py -3 agent.py --task daily-report

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "daily-report: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
