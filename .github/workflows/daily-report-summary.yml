name: Daily Report — Executive Summary

# Short executive-summary email for LEADERSHIP only (khasan + assad
# today, will grow). Composes the 7-block dashboard (3-4 lines each)
# and emails it to SUMMARY_EMAILS. Fires 30 min after the detailed
# report so leadership sees a digested view after the team has the
# full data.

on:
  schedule:
    # 09:30 BDT = 03:30 UTC.
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report-summary
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    env:
      MVP_PROJECTS_ROOT: 'E:\Projects'
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      # Executive summary goes to leadership only (will grow).
      SUMMARY_EMAILS: ${{ secrets.SUMMARY_EMAILS }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      # GitLab for backlog snapshot in the Requirement Tracking block.
      GITLAB_HOST: ${{ secrets.GITLAB_HOST }}
      GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Build + ship Executive Summary
        shell: pwsh
        run: py -3 agent.py --task daily-report-summary

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "daily-report-summary: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
