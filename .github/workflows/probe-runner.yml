name: Probe Runner Filesystem

# Non-destructive diagnostic. Lists key paths on the MVPACCESS runner so
# we know whether sibling projects already exist on disk or need to be
# checked out into the workspace.
#
# Delete this file once the investigation is done.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 5

    steps:
      - name: Identity + environment
        shell: pwsh
        run: |
          Write-Host "=== whoami ==="
          whoami
          Write-Host ""
          Write-Host "=== hostname ==="
          hostname
          Write-Host ""
          Write-Host "=== GITHUB_WORKSPACE ==="
          Write-Host "$env:GITHUB_WORKSPACE"
          Write-Host ""
          Write-Host "=== Current working directory ==="
          Get-Location
          Write-Host ""
          Write-Host "=== user profile paths ==="
          Write-Host "USERPROFILE=$env:USERPROFILE"
          Write-Host "APPDATA=$env:APPDATA"
          Write-Host "LOCALAPPDATA=$env:LOCALAPPDATA"

      - name: Probe E:\Projects (where sibling test projects should live)
        shell: pwsh
        run: |
          Write-Host "=== E:\ exists? ==="
          Test-Path 'E:\'
          Write-Host ""
          Write-Host "=== E:\Projects exists? ==="
          Test-Path 'E:\Projects'
          Write-Host ""
          Write-Host "=== E:\Projects contents (if any) ==="
          if (Test-Path 'E:\Projects') {
            Get-ChildItem 'E:\Projects' | Select-Object Name, Mode, LastWriteTime | Format-Table -AutoSize
          } else {
            Write-Host "(E:\Projects does not exist on this runner)"
          }
          Write-Host ""
          Write-Host "=== Individual sibling project checks ==="
          foreach ($p in @(
            'E:\Projects\MVP-Access-API-Test',
            'E:\Projects\MVP-Access-E2E-Test',
            'E:\Projects\MVP-Access-Easy-E2E-Test',
            'E:\Projects\MVP-Access-Release-Test',
            'E:\Projects\NAPCO-Nucleus'
          )) {
            $exists = Test-Path $p
            Write-Host "$p -> $(if ($exists) { 'EXISTS' } else { 'MISSING' })"
            if ($exists) {
              $hasAgent = Test-Path (Join-Path $p 'agent')
              $hasEnv = Test-Path (Join-Path $p '.env')
              Write-Host "  -> agent\ folder: $hasAgent"
              Write-Host "  -> .env file:    $hasEnv"
            }
          }

      - name: Probe other plausible drive letters
        shell: pwsh
        run: |
          foreach ($drive in @('C:', 'D:', 'E:', 'F:')) {
            $path = "$drive\Projects\MVP-Access-API-Test"
            if (Test-Path $path) {
              Write-Host "FOUND: $path"
            }
          }
          Write-Host ""
          Write-Host "=== All mapped drives ==="
          Get-PSDrive -PSProvider FileSystem | Format-Table Name, Root, Used, Free -AutoSize

      - name: Check Claude CLI + Python
        shell: pwsh
        run: |
          Write-Host "=== claude.exe location ==="
          Get-Command claude -ErrorAction SilentlyContinue | Select-Object Source | Format-List
          Get-Command claude.exe -ErrorAction SilentlyContinue | Select-Object Source | Format-List
          Write-Host ""
          Write-Host "=== Python launcher ==="
          py -3 --version
          Write-Host ""
          Write-Host "=== Node (Newman needs this) ==="
          node --version 2>&1
          npm --version 2>&1

      - name: Probe MVP Access API connectivity from the runner
        shell: pwsh
        env:
          BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          Write-Host "=== BASE_URL (masked) ==="
          if ($env:BASE_URL) {
            Write-Host "length=$($env:BASE_URL.Length)"
            Write-Host "starts-with-http=$($env:BASE_URL.StartsWith('http'))"
          } else {
            Write-Host "(not set)"
          }
          Write-Host ""
          Write-Host "=== Raw TCP connect to 172.16.205.209:80 ==="
          try {
            $t = Test-NetConnection -ComputerName '172.16.205.209' -Port 80 -InformationLevel Quiet
            Write-Host "TCP:80 reachable: $t"
          } catch { Write-Host "error: $_" }
          Write-Host ""
          Write-Host "=== Raw TCP connect to 172.16.205.209:443 ==="
          try {
            $t = Test-NetConnection -ComputerName '172.16.205.209' -Port 443 -InformationLevel Quiet
            Write-Host "TCP:443 reachable: $t"
          } catch { Write-Host "error: $_" }
          Write-Host ""
          Write-Host "=== HTTP GET against BASE_URL root (30s timeout) ==="
          try {
            $resp = Invoke-WebRequest -Uri $env:BASE_URL -TimeoutSec 30 -UseBasicParsing -ErrorAction Stop
            Write-Host "status: $($resp.StatusCode)"
            Write-Host "length: $($resp.RawContentLength) bytes"
          } catch {
            Write-Host "error: $($_.Exception.GetType().Name): $($_.Exception.Message)"
          }
          Write-Host ""
          Write-Host "=== HTTP POST to login endpoint (30s timeout, no auth — just see what answers) ==="
          try {
            $resp = Invoke-WebRequest -Uri "$($env:BASE_URL)/api/account/login" -Method POST -TimeoutSec 30 -UseBasicParsing -ErrorAction Stop
            Write-Host "status: $($resp.StatusCode)"
          } catch {
            Write-Host "error: $($_.Exception.GetType().Name): $($_.Exception.Message)"
          }
