name: NN - Poll Sent Folder

# Scans IMAP Sent folder for verification emails that have left
# Drafts -> Sent and stamps sent_at on the matching requirements.
# Closes the middle of the drafted -> sent -> confirmed lifecycle.
#
# Manual + every 6 hours on cron.

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Look-back window (days)'
        required: false
        default: '14'
        type: string
      dry_run:
        description: 'Find sent verifications but do not stamp memory'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours

permissions:
  contents: read

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 10

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Poll sent folder
        run: |
          $args = @('--days', '${{ inputs.days || '14' }}')
          if ('${{ inputs.dry_run }}' -eq 'true') { $args += '--dry-run' }
          py -3 -m tools.poll_sent @args
