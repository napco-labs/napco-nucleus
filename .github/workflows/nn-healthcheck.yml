name: NN - Healthcheck

# Verifies every external dependency the pipeline relies on:
# SMB share + IMAP + Drive + Whisper cache + Claude CLI +
# nucleus_memory.db + recent push activity + free disk.
#
# Runs manually + hourly on cron. Sends an email alert on failure
# (recipient: HEALTHCHECK_ALERT_TO env, falls back to SMTP_USER).

on:
  workflow_dispatch:
    inputs:
      alert_on_fail:
        description: 'Email summary when any check fails'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  schedule:
    - cron: '0 * * * *'  # top of every hour

permissions:
  contents: read

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 5

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Run healthcheck
        run: |
          $args = @()
          if ('${{ inputs.alert_on_fail || 'true' }}' -eq 'true') {
            $args += '--alert-on-fail'
          }
          py -3 -m tools.healthcheck @args
