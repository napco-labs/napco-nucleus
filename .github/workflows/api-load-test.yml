name: API Load Test

# Weekly Locust multi-tier load test. Claude analyzes capacity ceiling
# vs prior weeks from memory, ships PDF with recommendations.

on:
  schedule:
    # 02:00 BDT daily = 20:00 UTC the previous day.
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

concurrency:
  group: api-load-test
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 60

    env:
      # Sibling test project is checked out under the workspace below,
      # so PROJECTS_ROOT points at the workspace itself.
      MVP_PROJECTS_ROOT: ${{ github.workspace }}
      # MVP Access API creds — same set the api-functional-test workflow
      # exports. The sibling Locust + check_api_health code reads these
      # directly from os.environ (BASE_URL, no API_ prefix).
      BASE_URL: ${{ secrets.API_BASE_URL }}
      COMPANY_ID: ${{ secrets.COMPANY_ID }}
      USER_ID: ${{ secrets.USER_ID }}
      PASSWORD: ${{ secrets.PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      API_KEY: ${{ secrets.API_KEY }}
      DEALER_USERNAME: ${{ secrets.DEALER_USERNAME }}
      DEALER_PASSWORD: ${{ secrets.DEALER_PASSWORD }}
      DEALER_ACCOUNT: ${{ secrets.DEALER_ACCOUNT }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      - name: Checkout napco-nucleus
        uses: actions/checkout@v5

      - name: Checkout MVP-Access-API-Test (sibling)
        uses: actions/checkout@v5
        with:
          repository: titucse/MVP-Access-API-Test
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: MVP-Access-API-Test

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Install MVP-Access-API-Test dependencies
        shell: pwsh
        run: |
          if (Test-Path "MVP-Access-API-Test/requirements.txt") {
            py -3 -m pip install -r MVP-Access-API-Test/requirements.txt
          } else {
            Write-Host "no MVP-Access-API-Test/requirements.txt found, skipping"
          }

      - name: Run API Load Test
        shell: pwsh
        run: py -3 agent.py --task api-load-test ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "api-load-test: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
