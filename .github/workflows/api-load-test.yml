name: API Load Test

# Weekly Locust multi-tier load test. Claude analyzes capacity ceiling
# vs prior weeks from memory, ships PDF with recommendations.

on:
  schedule:
    # Sunday 21:00 UTC = Monday 03:00 BDT (weekly).
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

concurrency:
  group: api-load-test
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 60

    env:
      MVP_PROJECTS_ROOT: 'E:\Projects'
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      USER_ID: ${{ secrets.USER_ID }}
      COMPANY_ID: ${{ secrets.COMPANY_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: py -3 -m pip install -r requirements.txt

      - name: Run API Load Test
        shell: pwsh
        run: py -3 agent.py --task api-load-test ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit state changes
        if: always()
        shell: pwsh
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nucleus_memory.db 2>$null
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "api-load-test: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "no state changes"
            $global:LASTEXITCODE = 0
          }
