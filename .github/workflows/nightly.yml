name: MVP Access AI Agent — Nightly Unified Run

# Orchestrates the full MVP Access test cycle:
#   1. API functional (Newman / Postman)
#   2. Load (Locust, multi-tier)
#   3. Integration (pytest)
#   4. E2E (Playwright, against public staging URL)
#   5. Consolidated PDF report + email to TEAM_EMAILS
#
# Runs on the self-hosted Windows runner at 172.16.205.209 because:
#   - API + Load + Integration hit the local API at http://172.16.205.209:9096
#   - That IP is not reachable from GitHub's cloud runners
#   - E2E targets the public staging URL, but piggy-backs on the same machine
#     so we get ONE unified PDF and ONE email (not four fragments).

on:
  schedule:
    - cron: '0 17 * * *'    # 17:00 UTC = 23:00 Bangladesh time
  workflow_dispatch: {}

concurrency:
  group: mvp-access-nightly
  cancel-in-progress: false  # don't kill a run mid-Locust tier

jobs:
  run:
    name: Unified API + Load + Integration + E2E + Report
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120

    env:
      # --- API / auth (local API at 172.16.205.209:9096) ---
      BASE_URL: ${{ secrets.API_BASE_URL }}
      COMPANY_ID: ${{ secrets.COMPANY_ID }}
      USER_ID: ${{ secrets.USER_ID }}
      PASSWORD: ${{ secrets.PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      API_KEY: ${{ secrets.API_KEY }}
      DEALER_USERNAME: ${{ secrets.DEALER_USERNAME }}
      DEALER_PASSWORD: ${{ secrets.DEALER_PASSWORD }}
      DEALER_ACCOUNT: ${{ secrets.DEALER_ACCOUNT }}

      # --- E2E / Playwright (public staging URL) ---
      # E2E_BASE_URL is read by run_e2e_tests() in run_all_tests.py and
      # injected as BASE_URL only for the Playwright subprocess, so the
      # surrounding API/Load/Integration tests still see the local IP.
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      MVP_ACCOUNT: ${{ secrets.MVP_ACCOUNT }}
      MVP_USERNAME: ${{ secrets.MVP_USERNAME }}
      MVP_PASSWORD: ${{ secrets.MVP_PASSWORD }}

      # --- SMTP + email ---
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}

    steps:
      - name: Checkout AI-Agent (self)
        uses: actions/checkout@v5
        with:
          path: ai-agent

      - name: Checkout MVP-Access-API-Test
        uses: actions/checkout@v5
        with:
          repository: titucse/MVP-Access-API-Test
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api-test

      - name: Checkout MVP-Access-E2E-Test
        uses: actions/checkout@v5
        with:
          repository: titucse/MVP-Access-E2E-Test
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: e2e-test

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: api-test/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e-test/package-lock.json

      - name: Install API-Test Python dependencies
        working-directory: api-test
        run: pip install -r requirements.txt

      - name: Install Newman globally
        shell: bash
        run: |
          npm install -g newman
          echo "NEWMAN_PATH=$(npm prefix -g)/newman" >> $GITHUB_ENV

      - name: Install E2E npm dependencies
        working-directory: e2e-test
        run: npm ci

      - name: Install Playwright chromium
        working-directory: e2e-test
        run: npx playwright install --with-deps chromium

      - name: Ensure reports directory
        shell: bash
        run: mkdir -p api-test/reports

      - name: Run unified pipeline (API + Load + Integration + E2E + PDF + email)
        working-directory: api-test
        env:
          E2E_PROJECT_DIR: ${{ github.workspace }}/e2e-test
        run: python agent/run_all_tests.py
        timeout-minutes: 90

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            api-test/reports/*.pdf
            api-test/reports/*.json
            api-test/reports/*.csv
          retention-days: 30
