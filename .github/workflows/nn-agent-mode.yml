name: NN - Agent Mode

# Autonomous NAPCO Nucleus agent. Give it a free-form instruction
# and it decides which capabilities to invoke. Uses the same MCP
# tools as verify_session but follows agent_mode.md (judgment-based)
# instead of the fixed script.
#
# Examples:
#   - "What's pending for NAPCO Security this week?"
#   - "Summarise today's session and tell me what's worth drafting."
#   - "Check if today's call mentions anything that contradicts last
#      week's open items."

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: 'Free-form instruction for the agent'
        required: true
        type: string
      dry_run:
        description: 'Skip mutating actions (no email push, no memory writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

concurrency:
  group: nn-agent-mode
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    env:
      AGENT_INPUT: ${{ inputs.instruction }}

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Run agent_mode
        run: |
          $args = @('--task', 'agent_mode')
          if ('${{ inputs.dry_run }}' -eq 'true') { $args += '--dry-run' }
          py -3 agent.py @args
