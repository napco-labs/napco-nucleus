name: NN - Run Eval Harness

# Replay fixture cases under evals/cases/ through the verify_session
# identifier and score predicted vs expected via the LLM-as-judge.
# Use after prompt / model / pipeline changes to detect quality drift.

on:
  workflow_dispatch:
    inputs:
      case:
        description: 'Run one case (leave blank for all)'
        required: false
        default: ''
        type: string
      no_replay:
        description: 'Skip identify; score whatever sidecar is already on disk'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      skip_llm_judge:
        description: 'Skip the LLM-as-judge step (count-only output)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

concurrency:
  group: nn-eval
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 30

    defaults:
      run:
        shell: pwsh
        working-directory: 'C:\napco-nucleus'

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Run eval harness
        run: |
          $args = @()
          if ('${{ inputs.case }}' -ne '') {
            $args += @('--case', '${{ inputs.case }}')
          }
          if ('${{ inputs.no_replay }}' -eq 'true') { $args += '--no-replay' }
          if ('${{ inputs.skip_llm_judge }}' -eq 'true') { $args += '--skip-llm-judge' }
          py -3 -m evals.run @args

      - name: Upload latest eval result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: 'C:\napco-nucleus\evals\results\*.json'
          if-no-files-found: ignore
          retention-days: 30
