name: MVP Access API Load Test

# Runs Locust multi-tier load tests against the local API
# (172.16.205.209:9096), generates a focused PDF, emails to TEAM_EMAILS.

on:
  schedule:
    - cron: '0 17 * * *'    # 23:00 BDT — longest, runs first
  workflow_dispatch: {}

concurrency:
  group: mvp-load-test
  cancel-in-progress: false

jobs:
  run:
    name: Run Load Tests (Locust)
    runs-on: [self-hosted, Windows]
    timeout-minutes: 180

    env:
      BASE_URL: ${{ secrets.API_BASE_URL }}
      COMPANY_ID: ${{ secrets.COMPANY_ID }}
      USER_ID: ${{ secrets.USER_ID }}
      PASSWORD: ${{ secrets.PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      API_KEY: ${{ secrets.API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      # No email from this workflow — api-digest.yml consolidates all 3
      # API workflows into one daily email. SMTP vars still needed
      # because run_one.py imports email_sender at module load.
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}

    steps:
      - name: Checkout AI-Agent (self)
        uses: actions/checkout@v5
        with:
          path: ai-agent

      - name: Checkout MVP-Access-API-Test
        uses: actions/checkout@v5
        with:
          repository: titucse/MVP-Access-API-Test
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api-test

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: api-test/requirements.txt

      - name: Install Python deps
        working-directory: api-test
        run: pip install -r requirements.txt

      - name: Run Load Tests
        working-directory: api-test
        run: python agent/run_one.py --type load --no-email
        timeout-minutes: 150

      # Fixed artifact name (no run_number suffix) so api-digest.yml
      # can download it by predictable name via gh run download.
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: load-test-results
          path: api-test/reports/*
          retention-days: 7
