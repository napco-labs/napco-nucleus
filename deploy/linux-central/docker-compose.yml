# NAPCO Nucleus central host (Linux) -- docker-compose stack.
#
# Sits alongside the existing OpenProject stack on 172.16.205.123.
# Replaces the Windows .209 host's role: Samba share, transcription
# worker, periodic stagers, daily Requirement Management draft, and
# an optional self-hosted GHA runner.
#
# Bring up:    docker compose -f deploy/linux-central/docker-compose.yml up -d
# Bring down:  docker compose -f deploy/linux-central/docker-compose.yml down
# Logs:        docker compose -f deploy/linux-central/docker-compose.yml logs -f <service>
#
# The GHA runner is gated behind --profile runner so a smoke-test
# deploy doesn't register a runner before the team's ready:
#   docker compose --profile runner -f deploy/linux-central/docker-compose.yml up -d

name: nucleus-central

x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile.worker
  image: nucleus-worker:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    # Paths inside the container -- workers must use these, NOT the
    # host paths. Bind mounts below remap host -> container.
    - NUCLEUS_CENTRAL_PATH=/data/nucleus-central
    - PYTHONPATH=/app
    # memory.py defaults to <repo-root>/nucleus_memory.db; the repo is
    # bind-mounted RO, so the sqlite open fails. Point it at the
    # `nucleus-state` named volume below.
    - NAPCO_NUCLEUS_DB_PATH=/state/nucleus_memory.db
  volumes:
    # The repo, read-only. `git pull` on the host updates all workers
    # without an image rebuild.
    - ${REPO_PATH:-/home/ubuntu/napco-nucleus}:/app:ro
    # The shared central data dir -- same path Samba serves.
    - /srv/nucleus-central:/data/nucleus-central
    # Writable worker state (sqlite memory db, checkpoints, locks).
    # Lives in a named volume so `docker compose down` keeps it,
    # `docker compose down -v` resets it on purpose.
    - nucleus-state:/state
    # Writable overlay of ALL of data/ so the pipeline can write
    # wherever it wants under there. The repo stays RO via /app:ro
    # above, but /app/data/ is this writable host dir. Seed this dir
    # on first deploy from the repo's tracked data/ contents (templates,
    # drive-processed.json, proposed-tasks.json, state.json, inbox/
    # placeholders). After seeding it works as a transparent overlay:
    #   - data/_locks/    (tools/_lock.py file locks)
    #   - data/requirements/  (sessions/, archive/, Requirements Verification *.docx)
    #   - data/templates/  (READ-only via seed; pipeline doesn't write here)
    #   - any future data/ write target -- no compose change needed
    - /srv/nucleus-data:/app/data
    # Faster-whisper model cache (fallback path; rarely fires when
    # GROQ_API_KEY is set, but the model must persist when it does).
    - whisper-models:/root/.cache/huggingface
    # Claude Code Max-tier auth, bind-mounted RW from the host
    # ubuntu user so the Agent SDK can spill tool outputs to
    # ~/.claude/projects/, create session-env dirs, and refresh
    # OAuth tokens in ~/.claude.json. The :ro mount used here
    # until 2026-05-22 silently broke verify_session for ~1 week
    # (agent.py returned 0 on EROFS, so the supervising loop didn't
    # notice the empty drafts). Workers that call the Claude Agent
    # SDK pick these up automatically.
    - ${CLAUDE_HOME:-/home/ubuntu/.claude}:/root/.claude
    - ${CLAUDE_JSON:-/home/ubuntu/.claude.json}:/root/.claude.json
  working_dir: /app

services:

  # ----------------------------------------------------------------
  # Samba -- serves \\172.16.205.123\nucleus-central\ to dev PCs.
  # Single shared user (per Phase-1 decision). Backed by the same
  # /srv/nucleus-central host dir every worker uses.
  # ----------------------------------------------------------------
  samba:
    image: dperson/samba:latest
    container_name: nucleus-samba
    restart: unless-stopped
    network_mode: host  # SMB needs raw 139/445; bridge breaks NetBIOS discovery
    environment:
      - TZ=Asia/Dhaka
      - USERID=1001  # host ubuntu uid so files on /srv/nucleus-central are co-owned
      - GROUPID=1001
    command: >
      -u "${SAMBA_USER:-nucleus};${SAMBA_PASSWORD:?SAMBA_PASSWORD missing in .env}"
      -s "nucleus-central;/data/nucleus-central;yes;no;no;${SAMBA_USER:-nucleus};${SAMBA_USER:-nucleus}"
      -p
    volumes:
      - /srv/nucleus-central:/data/nucleus-central

  # ----------------------------------------------------------------
  # Transcribe worker -- ports the MVPACCESS 2-min Scheduled Task.
  # Walks /data/nucleus-central/*/<date>/calls/ for completed
  # sessions (signal: <session>.json present + <session>_transcript.md
  # missing). Uses Groq primary, faster-whisper fallback.
  # ----------------------------------------------------------------
  transcribe:
    <<: *worker-base
    container_name: nucleus-transcribe
    command: ["/usr/local/lib/nucleus-workers/transcribe-loop.sh"]

  # ----------------------------------------------------------------
  # Stage-email -- 15-min cadence. Captures Gmail content into central.
  # ----------------------------------------------------------------
  stage-email:
    <<: *worker-base
    container_name: nucleus-stage-email
    command: ["/usr/local/lib/nucleus-workers/stage-email-loop.sh"]

  # ----------------------------------------------------------------
  # Stage-drive -- 15-min cadence. Captures Google Drive content
  # (incl. Groq-transcribed Drive audio, separate from call audio).
  # ----------------------------------------------------------------
  stage-drive:
    <<: *worker-base
    container_name: nucleus-stage-drive
    command: ["/usr/local/lib/nucleus-workers/stage-drive-loop.sh"]

  # ----------------------------------------------------------------
  # Daily Requirement Management draft -- fires once per BD day at
  # the time set by DAILY_DRAFT_TARGET_TIME (TZ=Asia/Dhaka, so the
  # container's wall clock IS BD).
  # Runs collect_central.py for all clients over the last 24h.
  #
  # mem_limit: a runaway python ate 5.2 GB inside this container on
  # 2026-05-21 and tripped the host's global OOM-killer. Cap it so
  # any future runaway is cgroup-killed in isolation -- normal runs
  # peak well under 1 GB.
  # ----------------------------------------------------------------
  daily-draft:
    <<: *worker-base
    container_name: nucleus-daily-draft
    command: ["/usr/local/lib/nucleus-workers/daily-draft-loop.sh"]
    mem_limit: 3g
    mem_reservation: 512m

  # ----------------------------------------------------------------
  # Self-hosted GitHub Actions runner. Org-scoped to napco-labs so
  # any repo in the org can target it via runs-on: [self-hosted, linux].
  # Gated behind --profile runner so default `up` doesn't register
  # until the team is ready.
  # ----------------------------------------------------------------
  gha-runner:
    image: myoung34/github-runner:latest
    container_name: nucleus-gha-runner
    restart: unless-stopped
    profiles: ["runner"]
    env_file:
      - .env
    environment:
      # Don't validate these at compose-parse time -- the gha-runner
      # service is behind --profile runner, but compose still
      # interpolates env for all services on every command. Leave
      # blank-by-default; the runner container will fail-fast at
      # start time if the token is missing, which is the right
      # signal to fill .env before `--profile runner`.
      #
      # NOTE: RUNNER_TOKEN (not ACCESS_TOKEN). Two different paths in
      # the myoung34/github-runner entrypoint:
      #   - ACCESS_TOKEN: classic PAT with admin:org -- the image
      #     uses it to call POST /orgs/{org}/actions/runners/registration-token
      #     and auto-fetch a registration token on every (re)start.
      #     Best for long-running runners with rotation.
      #   - RUNNER_TOKEN: a pre-fetched registration token from
      #     org settings UI / API. One-shot, expires in ~1h, but
      #     once the runner is registered it's persistent.
      # Our org's PAT policy likely restricts admin:org scopes, so
      # the one-shot RUNNER_TOKEN path is the practical default.
      - RUNNER_SCOPE=org
      - ORG_NAME=${GHA_RUNNER_ORG:-}
      - RUNNER_TOKEN=${GHA_RUNNER_TOKEN:-}
      - RUNNER_NAME=nucleus-central-123
      - LABELS=self-hosted,linux,nucleus-central
      - EPHEMERAL=false
    volumes:
      # Give the runner docker access so CI jobs can build images and
      # `docker compose up -d` deploys against this same host.
      - /var/run/docker.sock:/var/run/docker.sock
      - gha-runner-work:/_work

volumes:
  whisper-models:
    name: nucleus-whisper-models
  nucleus-state:
    name: nucleus-state
  gha-runner-work:
    name: nucleus-gha-runner-work
